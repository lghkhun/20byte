name: 20byte

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-change-this-password}@mysql:3306/${MYSQL_DATABASE:-20byte}
  REDIS_URL: redis://redis:6379
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
  NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
  APP_URL: ${APP_URL:?APP_URL is required}
  SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:-${APP_URL:?APP_URL is required}/r}
  ABLY_API_KEY: ${ABLY_API_KEY:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
  RESEND_REPLY_TO_EMAIL: ${RESEND_REPLY_TO_EMAIL:-}
  R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
  R2_BUCKET: ${R2_BUCKET:-}
  R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
  WHATSAPP_MOCK_MODE: ${WHATSAPP_MOCK_MODE:-false}
  PAKASIR_PROJECT_SLUG: ${PAKASIR_PROJECT_SLUG:-}
  PAKASIR_API_KEY: ${PAKASIR_API_KEY:-}
  PAKASIR_BASE_URL: ${PAKASIR_BASE_URL:-https://app.pakasir.com}
  PAKASIR_DEFAULT_METHOD: ${PAKASIR_DEFAULT_METHOD:-qris}
  PAKASIR_WEBHOOK_PATH: ${PAKASIR_WEBHOOK_PATH:-/api/billing/webhooks/pakasir}
  PAKASIR_WEBHOOK_TOKEN: ${PAKASIR_WEBHOOK_TOKEN:-}
  SUPERADMIN_EMAILS: ${SUPERADMIN_EMAILS:-}

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8}
    container_name: 20byte_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
      - --performance-schema=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-20byte}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: 20byte_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    environment:
      <<: *app-env
      RUN_PRISMA_MIGRATE: "1"
    command: ["sh", "-c", "exit 0"]
    volumes:
      - runtime_data:/app/.runtime
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      <<: *app-env
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - runtime_data:/app/.runtime
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>{process.exit(response.ok?0:1);}).catch(()=>process.exit(1));"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    command: ["npm", "run", "worker:start"]
    environment:
      <<: *app-env
    volumes:
      - runtime_data:/app/.runtime
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  mysql_data:
  redis_data:
  runtime_data:
