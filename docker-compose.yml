services:
  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 20byte_web
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/20byte
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SHORTLINK_BASE_URL: ${SHORTLINK_BASE_URL:-http://localhost:3000/r}
      ABLY_API_KEY: ${ABLY_API_KEY:-ably-key-placeholder}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-r2-account-id}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-r2-access-key}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-r2-secret-key}
      R2_BUCKET: ${R2_BUCKET:-20byte-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-https://example-r2-public-url.invalid}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-dev-whatsapp-webhook-verify-token}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-dev-whatsapp-app-secret}
      WHATSAPP_TOKEN_ENCRYPTION_KEY: ${WHATSAPP_TOKEN_ENCRYPTION_KEY:-dev-whatsapp-token-encryption-key}
      WHATSAPP_EMBEDDED_APP_ID: ${WHATSAPP_EMBEDDED_APP_ID:-dev-whatsapp-embedded-app-id}
      WHATSAPP_EMBEDDED_CONFIG_ID: ${WHATSAPP_EMBEDDED_CONFIG_ID:-dev-whatsapp-embedded-config-id}
      WHATSAPP_MOCK_MODE: ${WHATSAPP_MOCK_MODE:-true}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 20byte_worker
    restart: unless-stopped
    command: ["npm", "run", "worker:start"]
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/20byte
      REDIS_URL: redis://redis:6379
      ABLY_API_KEY: ${ABLY_API_KEY:-ably-key-placeholder}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-r2-account-id}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-r2-access-key}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-r2-secret-key}
      R2_BUCKET: ${R2_BUCKET:-20byte-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-https://example-r2-public-url.invalid}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-dev-whatsapp-webhook-verify-token}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-dev-whatsapp-app-secret}
      WHATSAPP_TOKEN_ENCRYPTION_KEY: ${WHATSAPP_TOKEN_ENCRYPTION_KEY:-dev-whatsapp-token-encryption-key}
      WHATSAPP_EMBEDDED_APP_ID: ${WHATSAPP_EMBEDDED_APP_ID:-dev-whatsapp-embedded-app-id}
      WHATSAPP_EMBEDDED_CONFIG_ID: ${WHATSAPP_EMBEDDED_CONFIG_ID:-dev-whatsapp-embedded-config-id}
      WHATSAPP_MOCK_MODE: ${WHATSAPP_MOCK_MODE:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8}
    container_name: 20byte_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: 20byte
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7}
    container_name: 20byte_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
