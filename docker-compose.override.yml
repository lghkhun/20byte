services:
  web:
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      SHORTLINK_BASE_URL: http://localhost:3000/r
      WHATSAPP_MOCK_MODE: ${WHATSAPP_MOCK_MODE:-true}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

  worker:
    environment:
      NODE_ENV: development
      WHATSAPP_MOCK_MODE: ${WHATSAPP_MOCK_MODE:-true}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

volumes:
  app_node_modules:
  app_next:
